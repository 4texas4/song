<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #5568d3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .results {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        .track {
            padding: 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
        }
        .track:hover { background: #f5f5f5; }
        .track-name { font-weight: 600; color: #333; }
        .track-artist { color: #666; font-size: 14px; }
        .player {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .status { color: #666; margin-top: 10px; font-size: 14px; }
        audio { width: 100%; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Music Player</h1>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search for a song..." />
            <button onclick="search()">Search</button>
        </div>
        
        <div class="results" id="results"></div>
        
        <div class="player">
            <div id="nowPlaying">Search and select a track to play</div>
            <audio id="audio" controls style="display:none"></audio>
            <div class="status" id="status"></div>
        </div>
    </div>

    <script>
        async function getToken() {
            const res = await fetch('https://spotify-nu-six.vercel.app/api/token');
            const data = await res.json();
            return data.access_token;
        }

        async function searchSongs(query) {
            const token = await getToken();
            const res = await fetch(
                "https://api.spotify.com/v1/search?q=" + encodeURIComponent(query) + "&type=track&limit=20",
                { headers: { Authorization: "Bearer " + token } }
            );
            const data = await res.json();
            return data.tracks.items;
        }

        async function search() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;
            
            document.getElementById('status').textContent = 'Searching...';
            const tracks = await searchSongs(query);
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = tracks.map(track => `
                <div class="track" onclick="playTrack('${track.id}', '${track.name.replace(/'/g, "\\'")}', '${track.artists[0].name.replace(/'/g, "\\'")}')">
                    <div class="track-name">${track.name}</div>
                    <div class="track-artist">${track.artists.map(a => a.name).join(', ')}</div>
                </div>
            `).join('');
            
            document.getElementById('status').textContent = '';
        }

        async function playTrack(spotifyId, name, artist) {
            document.getElementById('status').textContent = 'Loading track...';
            document.getElementById('nowPlaying').textContent = `${name} - ${artist}`;
            
            try {
                const proxy = '/api/proxy?url=';
                
                const songLinkUrl = `https://api.song.link/v1-alpha.1/links?url=${encodeURIComponent('https://open.spotify.com/track/' + spotifyId)}`;
                const songLinkRes = await fetch(proxy + encodeURIComponent(songLinkUrl));
                const songLinkData = await songLinkRes.json();
                const tidalUrl = songLinkData.linksByPlatform?.tidal?.url;
                
                if (!tidalUrl) throw new Error('Tidal link not found');
                
                const tidalId = tidalUrl.match(/track\/(\d+)/)[1];
                
                const apiUrl = `https://triton.squid.wtf/track/?id=${tidalId}&quality=LOSSLESS`;
                const res = await fetch(apiUrl);
                const data = await res.json();
                
                let audioUrl = null;
                
                // Check for direct URL format
                if (data[0]?.OriginalTrackUrl) {
                    audioUrl = data[0].OriginalTrackUrl;
                }
                // Check for manifest format (DASH XML)
                else if (data.data?.manifest) {
                    const manifestBase64 = data.data.manifest;
                    const manifestXml = atob(manifestBase64);
                    
                    // Parse XML and extract initialization URL
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(manifestXml, 'text/xml');
                    const segmentTemplate = xmlDoc.querySelector('SegmentTemplate');
                    
                    if (segmentTemplate) {
                        const initUrl = segmentTemplate.getAttribute('initialization');
                        if (initUrl) {
                            audioUrl = initUrl.split('?')[0]; // Remove token params
                        }
                    }
                }
                
                if (!audioUrl) throw new Error('Could not get audio URL');
                
                const audio = document.getElementById('audio');
                audio.src = audioUrl;
                audio.style.display = 'block';
                audio.play();
                document.getElementById('status').textContent = 'Playing';
                
            } catch (error) {
                document.getElementById('status').textContent = 'Error: ' + error.message;
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') search();
        });
    </script>
</body>
</html>
